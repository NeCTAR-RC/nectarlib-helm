suite: nectarlib.serviceaccount
templates:
  - serviceaccount.yaml
release:
  name: my
  namespace: testing

tests:
  - it: ServiceAccount rendered when serviceAccount.create=true (default)
    template: serviceaccount.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: metadata.name
          value: my-consumer

  - it: serviceAccount.name overrides default name
    template: serviceaccount.yaml
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: serviceAccount.create=false renders nothing
    template: serviceaccount.yaml
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: serviceAccount.annotations are merged in
    template: serviceaccount.yaml
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123:role/example
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123:role/example

  - it: ServiceAccount carries the standard chart labels
    template: serviceaccount.yaml
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: consumer
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: my
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
